stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client sshpass
  script:
    - sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "bash /opt/gemini-store/scripts/deploy.sh"
